<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animacja reveal</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f12;
      overflow: hidden;
      font-family: sans-serif;
    }

    .hero {
      position: relative;
      width: min(900px, 90vw);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hero img {
      width: 100%;
      height: auto;
      display: block;
      transform-origin: center;

      /* start state: small + blurry */
      opacity: 0;
      transform: scale(0.7);
      filter: blur(22px);
    }
  </style>
</head>
<body>

  <div class="hero">
    <img src="devices.png" alt="Devices" id="heroImg" />
  </div>

  <script>
    window.addEventListener("load", () => {
      const img = document.getElementById("heroImg");

      gsap.to(img, {
        duration: 2.2,
        opacity: 1,
        scale: 1,
        filter: "blur(0px)",
        ease: "power3.out"
      });
    });
  </script>

</body>
</html>
