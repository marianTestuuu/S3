<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animacja reveal</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f12;
      overflow: hidden;
      font-family: sans-serif;
    }

    .hero {
      position: relative;
      width: min(900px, 90vw);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .main-image {
      width: 100%;
      height: auto;
      display: block;
      transform-origin: center;

      /* start state */
      opacity: 0;
      transform: scale(0.7);
      filter: blur(22px);
    }

    .secondary-image {
      position: absolute;
      width: 20%;
      right: 0;
      bottom: 5%;
      z-index: 5;

      opacity: 0;
      transform: translateX(220px) scale(0.9);
      filter: blur(10px);
      will-change: transform;
    }

    .hero img {
      width: 100%;
      height: auto;
      display: block;
      transform-origin: center;

      /* start state: small + blurry */
      opacity: 0;
      transform: scale(0.7);
      filter: blur(22px);
    }
  </style>
</head>
<body>

  <div class="hero">
    <img src="devices.png" alt="Devices" id="heroImg" class="main-image" />

    <!-- drugi obrazek -->
    <img src="smartfon.jpg" alt="Secondary Device" id="secondaryImg" class="secondary-image" />
  </div>

  <script>
    window.addEventListener("load", () => {
      const img = document.getElementById("heroImg");
      const secondary = document.getElementById("secondaryImg");

      const tl = gsap.timeline();

      // główny obrazek
      tl.to(img, {
        duration: 2.2,
        opacity: 1,
        scale: 1,
        filter: "blur(0px)",
        ease: "power3.out"
      })

      // drugi obrazek wjeżdża pod koniec pierwszej animacji
      .to(secondary, {
        duration: 0.9,
        opacity: 1,
        x: -120,
        scale: 1,
        filter: "blur(0px)",
        ease: "power4.out"
      }, "-=0.5");
    });
  </script>

</body>
</html>
